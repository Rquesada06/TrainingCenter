¿Por qué Expo + Firebase para el MVP?
A favor:

Expo elimina la configuración nativa (iOS/Android) → más velocidad
Firebase ofrece auth, DB y storage listos en horas
Real-time listeners de Firestore son perfectos para sincronización trainer-cliente
Firestore escala automáticamente sin ops
En contra (a considerar):

Firebase tiene vendor lock-in — mitigable con una capa de abstracción (repositorio pattern)
Firestore puede ser costoso a escala (10k+ usuarios activos con muchas lecturas)
Si se necesita lógica de negocio compleja, Firebase Functions tiene cold starts
Cuándo migrar a Node.js + PostgreSQL:

Si se necesita lógica de SQL compleja (reportes, analytics)
Si el costo de Firestore supera el beneficio
Si se quiere un backend completamente controlado
