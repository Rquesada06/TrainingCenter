4. User Stories Detalladas
Épica: Autenticación
US-01

Como entrenador, quiero iniciar sesión con mi email y contraseña para acceder a mi panel de administración.

Criterios de aceptación:

Email y password requeridos
Error claro si credenciales incorrectas
Sesión persistente (no pide login en cada apertura)
Botón "olvidé mi contraseña" con envío por email
US-02

Como cliente, quiero iniciar sesión con mis credenciales para ver mi entrenamiento del día.

Criterios de aceptación:

Misma lógica que US-01
Al ingresar, la pantalla principal muestra la rutina del día sin pasos adicionales
Épica: Gestión de Clientes (Trainer)
US-03

Como entrenador, quiero crear un nuevo cliente con nombre, email y contraseña temporal para que pueda ingresar a la app.

Criterios de aceptación:

Campos: nombre completo, email, password temporal, foto (opcional)
El cliente aparece en mi lista de clientes
El cliente puede loguearse con esas credenciales
US-04

Como entrenador, quiero ver la lista de mis clientes con el estado de su programa actual para gestionar su entrenamiento.

Criterios de aceptación:

Lista con nombre, foto, programa asignado y fecha de inicio
Indicador visual si el cliente no tiene programa activo
Tap en cliente abre su perfil con historial
Épica: Biblioteca de Ejercicios (Trainer)
US-05

Como entrenador, quiero crear ejercicios reutilizables para usarlos en múltiples rutinas sin repetir configuración.

Criterios de aceptación:

Campos: nombre, descripción, tipo (gym / home / ambos), categoría (fuerza / cardio / funcional / hipertrofia / HIIT / movilidad)
Configuración por defecto: series, reps, tiempo, descanso
Adjuntar URL de video (YouTube) o imagen
El ejercicio queda en mi biblioteca personal
US-06

Como entrenador, quiero buscar ejercicios de mi biblioteca por nombre o tipo para encontrarlos rápidamente al armar rutinas.

Criterios de aceptación:

Barra de búsqueda por nombre
Filtros: tipo (gym/home), categoría
Resultados instantáneos (no requiere búsqueda explícita)
Épica: Creación de Rutinas (Trainer)
US-07

Como entrenador, quiero crear una rutina diaria seleccionando ejercicios de mi biblioteca para asignarla a un día de un programa.

Criterios de aceptación:

La rutina tiene un nombre (ej: "Día 1 - Piernas")
Se pueden agregar ejercicios desde la biblioteca
Cada ejercicio en la rutina puede sobreescribir los valores por defecto (series, reps, etc.)
Se puede reordenar ejercicios con drag & drop
Se puede marcar la rutina como "gym", "home" o "ambos" (hereda del tipo de ejercicios)
US-08

Como entrenador, quiero definir alternativas gym/home para un ejercicio dentro de una rutina para que el cliente pueda adaptar su entrenamiento.

Criterios de aceptación:

Al agregar un ejercicio tipo "ambos", puedo asociar uno de tipo "gym" y otro de tipo "home"
El cliente verá ambas opciones y podrá elegir
Épica: Programas (Trainer)
US-09

Como entrenador, quiero crear un programa de entrenamiento asignando rutinas a días de la semana (o a días numerados) para estructurar el plan del cliente.

Criterios de aceptación:

El programa tiene nombre, descripción, duración (en semanas)
Puedo asignar una rutina a cada día (Lun-Dom o Día 1-N)
Puedo marcar días específicos como "Descanso"
Los días sin asignación también son descanso por defecto
US-10

Como entrenador, quiero asignar un programa a un cliente con una fecha de inicio para que la app calcule automáticamente la rutina de cada día.

Criterios de aceptación:

Selecciono cliente + programa + fecha de inicio
Si el cliente ya tiene un programa activo, se muestra advertencia antes de sobreescribir
A partir de la fecha de inicio, el día actual se mapea al día correspondiente del programa
Épica: Entrenamiento del día (Cliente)
US-11

Como cliente, quiero ver la rutina asignada para hoy al abrir la app para saber qué debo entrenar.

Criterios de aceptación:

Pantalla principal muestra: nombre de la rutina, tipo (gym/home), lista de ejercicios
Si es día de descanso, muestra mensaje motivacional + ícono de descanso
Si no hay programa asignado, muestra mensaje indicándolo
US-12

Como cliente, quiero ver el detalle de cada ejercicio (instrucciones, video, series/reps) para ejecutarlo correctamente.

Criterios de aceptación:

Tap en ejercicio abre vista de detalle
Muestra: nombre, descripción, series × reps / tiempo, descanso, video embebido o imagen
Botón para marcar como completado
US-13

Como cliente, quiero cambiar entre modo gym y home cuando un ejercicio tiene alternativas para adaptar el workout a dónde estoy.

Criterios de aceptación:

Toggle visible en la pantalla de la rutina del día
Al cambiar, los ejercicios con alternativas cambian su variante
La elección persiste para esa sesión
US-14

Como cliente, quiero marcar mi sesión del día como completada para registrar mi progreso.

Criterios de aceptación:

Botón "Finalizar sesión" visible cuando todos los ejercicios están marcados (o bypass manual)
Al completar, se registra la sesión en historial con fecha y hora
Animación/feedback positivo de celebración
Épica: Historial
US-15

Como cliente, quiero ver mi historial de sesiones completadas para rastrear mi consistencia.

Criterios de aceptación:

Lista de sesiones con fecha, nombre de rutina, y estado (completada / parcial)
Tap en sesión muestra detalle de qué ejercicios se completaron
US-16

Como entrenador, quiero ver el historial de sesiones de un cliente para evaluar su adherencia al programa.

Criterios de aceptación:

En el perfil del cliente, sección de historial
Lista de sesiones con fecha y estado
Porcentaje de adherencia (sesiones completadas / sesiones programadas)
5. Modelo de Datos Inicial
Usando Firestore (NoSQL). Las colecciones raíz en mayúsculas.

USERS
├── userId (doc)
│   ├── name: string
│   ├── email: string
│   ├── role: "trainer" | "client"
│   ├── photoUrl: string?
│   ├── trainerId: string?         // null si es trainer
│   ├── createdAt: timestamp
│   └── activeAssignmentId: string?
EXERCISES
└── exerciseId (doc)
    ├── trainerId: string
    ├── name: string
    ├── description: string
    ├── category: "strength" | "cardio" | "functional" | "hypertrophy" | "hiit" | "mobility"
    ├── location: "gym" | "home" | "both"
    ├── defaultSets: number?
    ├── defaultReps: number?
    ├── defaultDuration: number?    // segundos
    ├── defaultRest: number?        // segundos
    ├── videoUrl: string?
    ├── imageUrl: string?
    └── createdAt: timestamp
ROUTINES
└── routineId (doc)
    ├── trainerId: string
    ├── name: string
    ├── description: string?
    ├── estimatedDuration: number?  // minutos
    ├── exercises: [                // array embebido
    │   ├── exerciseId: string
    │   ├── order: number
    │   ├── sets: number?
    │   ├── reps: number?
    │   ├── duration: number?
    │   ├── rest: number?
    │   ├── notes: string?
    │   └── alternativeExerciseId: string?  // para gym/home swap
    │   ]
    └── createdAt: timestamp
PROGRAMS
└── programId (doc)
    ├── trainerId: string
    ├── name: string
    ├── description: string?
    ├── durationWeeks: number
    ├── days: [                     // array de 7 × durationWeeks
    │   ├── dayNumber: number       // 1, 2, 3...
    │   ├── isRest: boolean
    │   └── routineId: string?
    │   ]
    └── createdAt: timestamp
ASSIGNMENTS
└── assignmentId (doc)
    ├── trainerId: string
    ├── clientId: string
    ├── programId: string
    ├── startDate: timestamp
    ├── status: "active" | "completed" | "paused"
    └── createdAt: timestamp
SESSIONS
└── sessionId (doc)
    ├── clientId: string
    ├── assignmentId: string
    ├── programId: string
    ├── routineId: string
    ├── dayNumber: number
    ├── date: timestamp
    ├── locationMode: "gym" | "home"
    ├── status: "completed" | "partial"
    ├── completedExercises: [
    │   ├── exerciseId: string
    │   ├── completed: boolean
    │   └── variantUsed: "gym" | "home"?
    │   ]
    └── completedAt: timestamp?
Notas de diseño:

exercises dentro de ROUTINES es un array embebido (no subcolección) porque siempre se leen juntos. Límite razonable: 20-30 ejercicios por rutina.
days dentro de PROGRAMS es embebido por la misma razón. Para programas largos (12+ semanas) evaluar subcolección en fase 2.
SESSIONS es la colección más crítica para futuras analytics — diseñada para crecer.
