LauFit — Diseño MVP: Aplicación Móvil de Entrenamiento Personalizado
1. Resumen Ejecutivo del MVP
Nombre sugerido: LauFit (working title)

Propuesta de valor: Una herramienta simple y profesional que conecta al entrenador con su cliente. El entrenador programa, el cliente ejecuta. Sin fricción.

Alcance del MVP:

2 roles diferenciados: Admin/Entrenador y Cliente
Gestión completa de ejercicios, rutinas y programas
Asignación de programas a clientes
Experiencia de entrenamiento diario (ver, ejecutar, completar)
Historial básico de sesiones
Lo que el MVP NO incluye (decisión deliberada):

Chat o mensajería entre entrenador y cliente
Nutrición o seguimiento de calorías
Pagos o suscripciones dentro de la app
Notificaciones push avanzadas
Wearables / integración con Apple Health / Google Fit
Video propio (se usan links externos, ej. YouTube)
Multi-idioma
Analytics avanzados
