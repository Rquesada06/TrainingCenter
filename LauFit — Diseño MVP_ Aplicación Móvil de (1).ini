Monetización Futura (Bonus)
Tres modelos viables para escalar post-MVP:

Modelo	Descripción	Cuándo
SaaS por trainer	$29-79/mes por trainer según N° de clientes activos	Fase 8
Marketplace	Trainers venden programas a usuarios directamente en la app	Fase 9
White-label	Gyms pagan por versión personalizada con su branding	Fase 10
Recomendación: Empieza con SaaS por trainer. Es el modelo más predecible, más fácil de vender, y el que genera el feedback más valioso de los usuarios que más usan la plataforma.

Resumen Ejecutivo Final
Dimensión	Decisión
Stack	React Native (Expo) + Firebase
Pantallas MVP	~25 pantallas
Tiempo estimado	8-10 semanas con 1-2 devs
Roles	Trainer + Cliente
No construir ahora	Chat, nutrición, pagos in-app, wearables, video propio
Mayor riesgo técnico	Edición de programas activos → resolver con snapshots
Mayor riesgo producto	UX del trainer al crear programas → testear early
Monetización futura	SaaS $29-79/mes por trainer
El MVP es viable, bien definido y con ~25 pantallas. La clave del éxito está en hacer el flujo del trainer lo más rápido posible: crear un ejercicio y asignarlo a un cliente en menos de 3 minutos. Si eso es fácil, los trainers adoptarán la herramienta.