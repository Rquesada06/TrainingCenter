9. Riesgos y Consideraciones Técnicas
Riesgos Técnicos
Riesgo	Impacto	Probabilidad	Mitigación
Cálculo erróneo de "rutina del día" con zonas horarias	Alto	Media	Usar fechas UTC + lógica de días numerados, no fechas absolutas por defecto
Datos inconsistentes si se edita un programa asignado	Alto	Alta	Al asignar, guardar snapshot del programa O versionar programas
Rendimiento de Firestore con muchos clientes	Medio	Baja (MVP)	Paginación desde el inicio; índices compuestos bien definidos
Ejercicios duplicados en biblioteca	Bajo	Alta	Búsqueda antes de crear; normalización de nombres
Videos de YouTube bloqueados en algunos países	Medio	Baja	Documentar limitación; considerar Vimeo como alternativa
Sesión iniciada y app cerrada (datos perdidos)	Alto	Media	Guardar estado de sesión en Firestore en tiempo real (no solo al finalizar)
Consideraciones de Diseño de Datos
Problema crítico — Edición de programas asignados:
Si un trainer edita un programa mientras un cliente lo está ejecutando, ¿qué pasa? Dos opciones:

Opción A (Recomendada para MVP): Al asignar, copiar el programa completo al assignment (snapshot inmutable). El trainer edita su "template", no el assignment activo.
Opción B: Versionar programas. Más complejo, para fase 2.
Estructura gym/home en ejercicios:
El toggle gym/home requiere que un ejercicio en la rutina tenga referencia a su alternativa. Dos enfoques:

// Opción A — Par de ejercicios con referencia cruzada (recomendado MVP)
routineExercise: {
  exerciseId: "sentadilla-barra",        // gym
  alternativeExerciseId: "sentadilla-goblet",  // home
}

// Opción B — Un solo ejercicio con variantes embebidas (más complejo)
exercise: {
  variants: { gym: {...}, home: {...} }
}
La Opción A es más simple y reutiliza la biblioteca existente.

Consideraciones de Seguridad
Las reglas de Firestore deben garantizar que un cliente solo pueda leer su propio assignment y sesiones
Un trainer solo puede leer/escribir sus propios clientes, ejercicios, rutinas y programas
Nunca exponer IDs de otros clientes en el cliente móvil
Las reglas de seguridad de Firebase son tan importantes como el código de la app
// Ejemplo de regla Firestore crítica
match /sessions/{sessionId} {
  allow read, write: if request.auth.uid == resource.data.clientId
    || isTrainerOf(resource.data.clientId);
}
