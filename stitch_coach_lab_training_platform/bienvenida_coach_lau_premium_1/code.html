<style>
        body {
            background-color: #0e0e0e;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(173, 198, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(44, 70, 119, 0.05) 0%, transparent 30%);
            z-index: -1;
        }

        .glow-button {
            box-shadow: 0 0 40px rgba(173, 198, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glow-button:hover {
            box-shadow: 0 0 60px rgba(173, 198, 255, 0.4);
            transform: scale(1.05);
        }

        .animate-pulse-slow {
            animation: pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .glass-container {
            background: rgba(32, 31, 31, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(68, 71, 79, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex flex-col min-h-screen items-center justify-between text-center overflow-hidden">
<div class="bg-mesh animate-pulse-slow"></div>
<!-- Top Spacing / Ambient Header -->
<header class="w-full pt-container-padding-desktop flex justify-center opacity-0 animate-[fadeIn_1s_ease-out_forwards]">
<div class="px-6 py-2 glass-container rounded-full flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary-fixed-dim animate-pulse"></span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">System Online</span>
</div>
</header>
<!-- Main Content -->
<main class="flex flex-col items-center px-container-padding-mobile max-w-2xl w-full z-10">
<!-- Brand Title -->
<div class="mb-section-gap space-y-4">
<h1 class="font-display-lg text-display-lg md:text-[64px] text-primary tracking-tighter animate-[slideDown_0.8s_ease-out_forwards]">
                COACH LAU
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto opacity-0 animate-[fadeIn_1s_ease-out_0.4s_forwards]">
                Tu evolución, nuestra ciencia.
            </p>
</div>
<!-- CTA Section -->
<div class="flex flex-col items-center gap-6 w-full max-w-xs opacity-0 animate-[slideUp_0.8s_ease-out_0.6s_forwards]">
<button class="w-full py-5 px-8 rounded-full bg-primary text-on-primary font-headline-md glow-button flex items-center justify-center gap-3">
                Empezar ahora
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2" href="#">
                ¿Ya tienes cuenta? 
                <span class="font-bold border-b border-primary/30">Inicia sesión</span>
</a>
</div>
</main>
<!-- Footer Identity -->
<footer class="w-full pb-12 px-container-padding-mobile flex flex-col items-center gap-8 opacity-0 animate-[fadeIn_1s_ease-out_1s_forwards]">
<!-- Brand Promise -->
<div class="flex flex-col items-center gap-2">
<div class="h-[1px] w-12 bg-outline-variant/50 mb-4"></div>
<p class="font-label-md text-label-md tracking-[0.2em] text-on-surface-variant/60 uppercase">
                ELITE ATHLETIC PERFORMANCE SYSTEM
            </p>
</div>
<!-- Cloud Sync Info -->
<div class="flex items-center gap-2 text-on-surface-variant/40">
<span class="material-symbols-outlined text-[14px]">cloud_done</span>
<span class="font-label-sm text-label-sm">Secure Cloud Sync Active</span>
</div>
</footer>
<!-- Animation Keyframes -->
<style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script>
        // Micro-interaction for the button
        const mainCta = document.querySelector('button');
        mainCta.addEventListener('mousedown', () => {
            mainCta.style.transform = 'scale(0.95)';
        });
        mainCta.addEventListener('mouseup', () => {
            mainCta.style.transform = 'scale(1.05)';
        });

        // Subtle parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const mesh = document.querySelector('.bg-mesh');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            mesh.style.background = `
                radial-gradient(circle at ${50 + (x - 0.5) * 10}% ${50 + (y - 0.5) * 10}%, rgba(173, 198, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at ${80 + (x - 0.5) * 5}% ${20 + (y - 0.5) * 5}%, rgba(44, 70, 119, 0.05) 0%, transparent 30%)
            `;
        });
    </script>
