<style>
        body {

            overflow: hidden;

        .ambient-glow {
            background: radial-gradient(circle at 50% 50%, rgba(0, 255, 102, 0.08) 0%, rgba(14, 14, 14, 0) 70%);
        }

            background: rgba(18, 18, 18, 0.7);

            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
        }

        .scanning-line {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 102, 0.3), transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<script>
        function handleStart() {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100');
            
            // Simulation of transition to main app
            setTimeout(() => {
                console.log('Transitioning to onboarding flow...');
                // In a real app: window.location.href = '/onboarding';
            }, 2000);
        }

        // Parallax effect for the background hero
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;
            const hero = document.querySelector('img');
            if (hero) {
                hero.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
            }
        });

        // Initialize animations on load
        window.addEventListener('load', () => {
            document.body.classList.add('ready');
        });
    </script>
